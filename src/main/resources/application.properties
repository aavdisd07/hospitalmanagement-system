# =====================================================================
# Hospital Management System — runtime configuration
# ---------------------------------------------------------------------
# SECURITY:
#   The values below are DEVELOPMENT DEFAULTS only.
#   * Do NOT use root/root in any deployed environment.
#   * Override every property in production by setting an environment
#     variable with the SAME name in upper case and dots replaced by
#     underscores. AppConfig.get() reads env vars first.
#       db.url       ->  DB_URL
#       db.user      ->  DB_USER
#       db.password  ->  DB_PASSWORD
#   * The Flyway-seeded admin user is  admin / admin123.
#     Change the password immediately on first login (or rotate the
#     bcrypt hash in V2 migration before initial deploy).
# =====================================================================

db.url=jdbc:mysql://localhost:3306/hospitalmanagementsystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.user=root
db.password=root

db.pool.maxSize=10
db.pool.minIdle=2
db.pool.connectionTimeoutMs=30000

flyway.enabled=true
flyway.baselineOnMigrate=true
